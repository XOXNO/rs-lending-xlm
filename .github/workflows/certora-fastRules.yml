name: Certora Prover Fast Rules

on:
  pull_request:
    branches:
      - main
      - master
      - certora
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  statuses: write

env:
  CARGO_TERM_COLOR: always
  STELLAR_VERSION: '26.0.0'
  CERTORAKEY: ${{ secrets.CERTORAKEY }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  certora-fast:
    name: Fast Certora Rules
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95"
          targets: wasm32v1-none
          components: rustfmt

      - name: Cache cargo registry and build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-certora-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-certora-

      - name: Install stellar-cli
        # Version from workflow env. The later CERTORAKEY guard (below) will
        # fail loudly for fork PRs that lack the secret.
        run: bash .github/scripts/install-stellar-cli.sh

      - name: Compile Certora feature paths
        run: ./certora/compile_all.sh

      # Fork PRs without org-secret access must skip this workflow at the
      # trigger level — a missing CERTORAKEY fails the job here.
      - name: Verify CERTORAKEY is configured
        run: |
          if [ -z "$CERTORAKEY" ]; then
            echo "::error::CERTORAKEY secret is not configured; hosted prover cannot run."
            echo "::error::A missing secret must fail this job, not silently skip it."
            echo "::error::Either configure CERTORAKEY, or scope this workflow to internal PRs only."
            exit 1
          fi

      - name: Install Certora CLI
        run: python3 -m pip install --upgrade certora-cli

      - name: Run fast Certora configs
        run: ./certora/run_profile.py fast
