name: Certora Prover Fast Rules

on:
  pull_request:
    branches:
      - main
      - master
      - certora
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  statuses: write

env:
  CARGO_TERM_COLOR: always
  CERTORAKEY: ${{ secrets.CERTORAKEY }}

jobs:
  certora-fast:
    name: Fast Certora Rules
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.93"
          targets: wasm32v1-none
          components: rustfmt

      - name: Cache cargo registry and build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-certora-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-certora-

      - name: Install stellar-cli
        run: |
          STELLAR_VERSION=26.0.0
          if ! command -v stellar >/dev/null 2>&1 || ! stellar --version | grep -qE "^stellar $STELLAR_VERSION"; then
            mkdir -p "$HOME/.local/bin"
            curl -fsSL "https://github.com/stellar/stellar-cli/releases/download/v${STELLAR_VERSION}/stellar-cli-${STELLAR_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
              | tar -xz -C "$HOME/.local/bin"
            chmod +x "$HOME/.local/bin/stellar"
          fi
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/stellar" --version

      - name: Compile Certora feature paths
        run: ./verification/certora/compile_all.sh

      - name: Install Certora CLI
        if: ${{ env.CERTORAKEY != '' }}
        run: python3 -m pip install --upgrade certora-cli

      - name: Run fast Certora configs
        if: ${{ env.CERTORAKEY != '' }}
        run: ./verification/certora/run_profile.py fast

      - name: Skip hosted prover
        if: ${{ env.CERTORAKEY == '' }}
        run: echo "CERTORAKEY is not configured; compile and orphan checks completed, hosted prover skipped."
