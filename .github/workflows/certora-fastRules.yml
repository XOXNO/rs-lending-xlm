name: Certora Prover Fast Rules

on:
  # Runs a Certora rule profile on demand (default: fast).
  # PR confidence comes from ci.yml and fuzz.yml.
  workflow_dispatch:
    inputs:
      profile:
        description: "Certora profile to run (see certora/profiles.json)"
        type: choice
        default: fast
        options:
          - fast
          - core
          - heavy
          - sanity
          - all

permissions:
  contents: read
  pull-requests: write
  statuses: write

env:
  CARGO_TERM_COLOR: always
  STELLAR_VERSION: '27.0.0'
  # CERTORAKEY is NOT workflow-wide: it is scoped to the two steps that need it
  # (the guard and the prover run) so earlier steps (checkout, compile) that run
  # repo scripts on the self-hosted runner never see the prover secret.

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  certora-fast:
    name: Fast Certora Rules
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master, pinned 2026-07-22
        with:
          toolchain: "1.95"
          targets: wasm32v1-none
          components: rustfmt

      - name: Cache cargo registry and build
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-certora-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-certora-

      - name: Install stellar-cli
        # Version from workflow env. The later CERTORAKEY guard (below) will
        # fail loudly for fork PRs that lack the secret.
        run: bash .github/scripts/install-stellar-cli.sh

      - name: Compile Certora feature paths
        run: ./certora/compile_all.sh --wasm

      # Fork PRs without org-secret access must skip this workflow at the
      # trigger level — a missing CERTORAKEY fails the job here.
      - name: Verify CERTORAKEY is configured
        env:
          CERTORAKEY: ${{ secrets.CERTORAKEY }}
        run: |
          if [ -z "$CERTORAKEY" ]; then
            echo "::error::CERTORAKEY secret is not configured; hosted prover cannot run."
            echo "::error::A missing secret must fail this job, not silently skip it."
            echo "::error::Either configure CERTORAKEY, or scope this workflow to internal PRs only."
            exit 1
          fi

      - name: Install Python
        # The self-hosted runner's system python3 is externally managed (PEP
        # 668) and lacks the venv module. A hermetic interpreter from the tool
        # cache sidesteps both, so certora-cli installs without touching system
        # packages.
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Install Certora CLI
        run: pip install --require-hashes -r certora/requirements-cli.txt

      - name: Run Certora configs
        env:
          CERTORAKEY: ${{ secrets.CERTORAKEY }}
          PROFILE: ${{ inputs.profile || 'fast' }}
        run: ./certora/scripts/run_profile.py "$PROFILE"
