name: CI

on:
  push:
    branches: [master, main, feat/*, rc/*]
  pull_request:
    branches: [master, main, feat/*, rc/*]
  workflow_dispatch:

permissions:
  # Least-privilege: this workflow only needs read for checkout + local tool
  # execution. No gh uploads, attestations, or PR writes occur here.
  contents: read

env:
  CARGO_TERM_COLOR: always
  STELLAR_VERSION: '27.0.0'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-and-test:
    name: Build & Test
    runs-on: self-hosted
    # sccache caches per-crate compilations under $HOME (persistent on the
    # self-hosted runner), shared with the other self-hosted jobs and warming
    # cold runners. CARGO_INCREMENTAL=0 is required for sccache to cache.
    env:
      RUSTC_WRAPPER: sccache
      CARGO_INCREMENTAL: '0'
      SCCACHE_CACHE_SIZE: 20G
    steps:
      - uses: actions/checkout@v7
        with:
          # Persistent self-hosted runners keep $HOME (cargo registry, git, and
          # installed tool binaries) and the workspace between runs. Skip the
          # default git clean so the Cargo build cache in target/ survives; the
          # next step restores a clean source tree while preserving target/.
          clean: false

      - name: Reset workspace, preserve target/ build cache
        run: |
          git reset --hard
          git clean -ffdx -e target

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: '1.95'
          targets: wasm32v1-none
          components: clippy, rustfmt

      - name: Install stellar-cli
        # Reuses the platform-aware idempotent helper. Version comes from the
        # workflow env. stellar-cli is pinned independently of the soroban-sdk
        # crate (`=26.1.0`): CLI 27.x builds those contracts fine and the wasm
        # size budget is verified against it.
        run: bash .github/scripts/install-stellar-cli.sh

      - name: Install sccache (prebuilt)
        uses: taiki-e/install-action@v2
        with:
          tool: sccache

      - name: Build deploy artifacts and WASM size budget
        run: make wasm-size-check

      - name: Run tests
        run: cargo test --workspace

      - name: Clippy (workspace)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Clippy (fuzz crate, workspace-excluded)
        run: make clippy-fuzz

  security-scan:
    name: Security Scan (OpenZeppelin)
    runs-on: self-hosted
    needs: build-and-test
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: wasm32v1-none

      - name: Install soroban-scanner
        # Installs XOXNO fork pinned by commit SHA.
        # The fork handles scanner parser and stack limits used by this workspace.
        # Switch back to upstream when equivalent fixes are available.
        #
        # SECURITY: reinstall the pinned rev on every run rather than trusting a
        # cached binary. This gate shares the persistent self-hosted runner with
        # untrusted PR code (build scripts, tests) that could plant a fake
        # `soroban-scanner` on PATH and a matching marker, then have this job
        # skip the install and run the attacker's binary. `cargo install` from
        # the pinned git rev overwrites any such binary with the trusted build,
        # so the audit cannot be bypassed via runner-local state.
        run: |
          cargo +nightly install --git https://github.com/XOXNO/soroban-security-detectors-sdk \
            --rev 43231611f039c444c4a1db0ef2ef25c3257afff1 \
            soroban-security-detectors-runner

      - name: Run security detectors
        # Runs scanner with audit-gate exclusions and retries transient stack failures.
        # Scope filtering reports deployable-crate findings.
        run: .github/scripts/run_scanner.sh

      - name: Run security detectors (strict)
        if: github.event_name == 'pull_request'
        run: |
          .github/scripts/run_scanner.sh | tee scan-results.txt
          if grep -q "CRITICAL\|HIGH" scan-results.txt; then
            echo "::error::Security scan found CRITICAL or HIGH severity issues"
            exit 1
          fi

  scout-audit:
    name: Scout Audit (advisory)
    runs-on: self-hosted
    needs: build-and-test
    steps:
      - uses: actions/checkout@v7
        with:
          # Persistent runner: preserve target/ across runs (see build-and-test).
          clean: false

      - name: Reset workspace, preserve target/ build cache
        run: |
          git reset --hard
          git clean -ffdx -e target

      - name: Run Scout
        # Pinned to an immutable Scout commit (NOT the moving v1 tag): this self-hosted
        # runner caches action checkouts under _work/_actions, so a moved tag can serve a
        # stale build — a SHA forces a fresh fetch and is the right security posture for a
        # runner shared with PR code. The action installs the detector toolchain and builds
        # the driver + all detectors from its own pinned checkout, so Scout never fetches
        # code over the network during analysis. Advisory: findings are written to reports,
        # not gated; the step fails only if a contract does not analyze cleanly.
        uses: mihaieremia/scout-audit@fd272ce6cdda5f750ebae322fde74eb2f3675d7d
        with:
          contracts: |
            contracts/pool
            contracts/controller
            contracts/governance
            contracts/defindex-strategy
          exclude: dos-unexpected-revert-with-storage
          output-format: md
          output-dir: target/scout-audit
          extra-args: "-- --locked"

      - name: Upload Scout reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: scout-audit-reports
          path: target/scout-audit/
