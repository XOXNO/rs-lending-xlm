name: CI

on:
  push:
    branches: [master, main, feat/*, rc/*]
  pull_request:
    branches: [master, main, feat/*, rc/*]
  workflow_dispatch:

permissions:
  # Least-privilege: this workflow only needs read for checkout + local tool
  # execution. No gh uploads, attestations, or PR writes occur here.
  contents: read

env:
  CARGO_TERM_COLOR: always
  STELLAR_VERSION: '26.1.0'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-and-test:
    name: Build & Test
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6
        with:
          # Persistent self-hosted runners keep $HOME (cargo registry, git, and
          # installed tool binaries) and the workspace between runs. Skip the
          # default git clean so the Cargo build cache in target/ survives; the
          # next step restores a clean source tree while preserving target/.
          clean: false

      - name: Reset workspace, preserve target/ build cache
        run: |
          git reset --hard
          git clean -ffdx -e target

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: '1.95'
          targets: wasm32v1-none
          components: clippy, rustfmt

      - name: Install stellar-cli
        # Reuses the platform-aware idempotent helper. Version comes from
        # the workflow env (kept in sync with rust-toolchain.toml + soroban-sdk pin).
        run: bash .github/scripts/install-stellar-cli.sh

      - name: Build deploy artifacts and WASM size budget
        run: make wasm-size-check

      - name: Run tests
        run: cargo test --workspace

      - name: Clippy (workspace)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Clippy (fuzz crate, workspace-excluded)
        run: make clippy-fuzz

  security-scan:
    name: Security Scan (OpenZeppelin)
    runs-on: self-hosted
    needs: build-and-test
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: wasm32v1-none

      - name: Install soroban-scanner
        # Installs from XOXNO's fork of soroban-security-detectors-sdk, pinned
        # by commit SHA for reproducibility. The fork carries six patches on
        # top of upstream `main` (commit f3888e0):
        #   1. tolerate non-UTF-8 byte-string literals (upstream panics on
        #      `b"a\xc3\x28d"` in soroban-sdk-25.x unit tests);
        #   2. accept `extern "C" { ... }` foreign modules (upstream hits
        #      `todo!("Should not appear")` on vendored FFI crates such as
        #      `vendor/cvlr`);
        #   3. warn-and-continue on unparseable files instead of aborting the
        #      whole workspace scan;
        #   4. `--exclude <substring>...` CLI flag that skips matching paths
        #      during file discovery (see scan steps below);
        #   5. run the scan on a 4 GiB-stack worker thread (upstream's
        #      symbol resolver overflows the default 8 MiB main-thread stack
        #      on real workspaces; the Linux self-hosted runner needed more
        #      headroom than macOS);
        #   6. canonicalize corpus keys so the symbol resolver's internal
        #      canonical-path lookups hit.
        # When upstream ships these, switch the --git URL back to
        # OpenZeppelin/soroban-security-detectors-sdk and drop --rev.
        run: |
          cargo +nightly install --git https://github.com/XOXNO/soroban-security-detectors-sdk \
            --rev 43231611f039c444c4a1db0ef2ef25c3257afff1 \
            soroban-security-detectors-runner

      - name: Run security detectors
        # run_scanner.sh invokes soroban-scanner with the audit-gate scope
        # (--exclude vendor/ target/ .certora_internal) and retries up to
        # 5 times to absorb upstream's non-deterministic stack-overflow.
        # Output is piped through scope_scanner_output.py, which narrows
        # findings to the deployable crates (common, pool-interface, pool,
        # controller) — tests/test-harness and tests/fuzz stay in the scan
        # corpus so the symbol resolver can see cross-crate references
        # (passing a smaller corpus makes the resolver recurse unboundedly),
        # but their findings are noise for an audit gate.
        run: .github/scripts/run_scanner.sh

      - name: Run security detectors (strict)
        if: github.event_name == 'pull_request'
        run: |
          .github/scripts/run_scanner.sh | tee scan-results.txt
          if grep -q "CRITICAL\|HIGH" scan-results.txt; then
            echo "::error::Security scan found CRITICAL or HIGH severity issues"
            exit 1
          fi

  scout-audit:
    name: Scout Audit (advisory)
    runs-on: self-hosted
    needs: build-and-test
    steps:
      - uses: actions/checkout@v6
        with:
          # Persistent runner: preserve target/ across runs (see build-and-test).
          clean: false

      - name: Reset workspace, preserve target/ build cache
        run: |
          git reset --hard
          git clean -ffdx -e target

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: '1.95'
          targets: wasm32v1-none

      - name: Install Scout detector toolchain
        run: rustup toolchain install nightly-2025-08-07 --component rustc-dev --target wasm32v1-none

      - name: Install Scout
        run: |
          cargo install \
            --git https://github.com/mihaieremia/scout-audit.git \
            --rev 57ce8762c4bea3fdecd37bdc3ee5729be66472da \
            cargo-scout-audit \
            --locked

      - name: Run Scout
        run: make scout

      - name: Upload Scout reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: scout-audit-reports
          path: target/scout-audit/
