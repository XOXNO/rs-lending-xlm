name: CI

on:
  push:
    branches: [master, main, feat/*, rc/*]
  pull_request:
    branches: [master, main, feat/*, rc/*]
  workflow_dispatch:

permissions:
  actions: write
  checks: write
  contents: write
  id-token: write
  pull-requests: write
  statuses: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: '1.93'
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry & build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build contracts
        run: cargo build --release --target wasm32-unknown-unknown

      - name: Run tests
        run: cargo test --workspace

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  security-scan:
    name: Security Scan (OpenZeppelin)
    runs-on: ubuntu-latest
    needs: build-and-test
    # TODO: remove continue-on-error once soroban-scanner v0.0.2 UTF-8 panic is fixed upstream
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: wasm32-unknown-unknown

      - name: Install soroban-scanner
        run: |
          cargo +nightly install --git https://github.com/OpenZeppelin/soroban-security-detectors-sdk soroban-security-detectors-runner

      - name: Run security detectors
        run: |
          soroban-scanner scan . --project-root .

      - name: Run security detectors (strict)
        if: github.event_name == 'pull_request'
        run: |
          soroban-scanner scan . --project-root . 2>&1 | tee scan-results.txt
          if grep -q "CRITICAL\|HIGH" scan-results.txt; then
            echo "::error::Security scan found CRITICAL or HIGH severity issues"
            exit 1
          fi
