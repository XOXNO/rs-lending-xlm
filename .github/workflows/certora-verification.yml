name: Certora Verification

on:
  # Full formal verification remains explicit because hosted Prover jobs consume credits.
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  STELLAR_VERSION: '27.0.0'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  compile-check:
    name: Certora compile, coverage, and artifacts
    runs-on: ubuntu-latest
    outputs:
      sanity-matrix: ${{ steps.sanity-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master, pinned 2026-07-22
        with:
          toolchain: "1.95"
          targets: wasm32v1-none

      - name: Install stellar-cli
        run: bash .github/scripts/install-stellar-cli.sh

      - name: Compile and run static proof-integrity gates
        run: ./certora/compile_all.sh

      - name: Build fresh Certora WASM artifacts
        run: make certora-wasm

      - name: Verify WASM hashes and source provenance
        run: python3 certora/scripts/check_wasm_artifacts.py

      - id: sanity-matrix
        name: Derive sanity matrix from profiles.json
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path

          profiles = json.loads(Path("certora/profiles.json").read_text())["profiles"]
          matrix = []
          for item in profiles["sanity"]:
              conf = Path(item["conf"])
              matrix.append({
                  "label": conf.stem,
                  "conf_dir": str(conf.parent),
                  "conf": conf.name,
              })
          print("matrix=" + json.dumps({"include": matrix}, separators=(",", ":")))
          PY

      - name: Upload fresh Certora WASM artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: certora-wasm-${{ github.sha }}
          path: artifacts/wasm
          if-no-files-found: error
          retention-days: 3

  sanity:
    name: Sanity — ${{ matrix.label }}
    needs: compile-check
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix: ${{ fromJSON(needs.compile-check.outputs.sanity-matrix) }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Install Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Install Java
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Install Certora CLI
        run: pip install --require-hashes -r certora/requirements-cli.txt

      - name: Download pinned Certora WASM artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: certora-wasm-${{ github.sha }}
          path: artifacts/wasm

      - name: Recheck artifact hashes after transfer
        run: python3 certora/scripts/check_wasm_artifacts.py

      - name: Verify focused reachability job
        env:
          CERTORAKEY: ${{ secrets.CERTORAKEY }}
        working-directory: ${{ matrix.conf_dir }}
        run: certoraSorobanProver ${{ matrix.conf }}
