name: Scout Audit

on:
  pull_request:
    branches: [master, main, feat/*, rc/*]
  workflow_dispatch:

concurrency:
  group: scout-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scout:
    name: Scout Audit (advisory)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v7
        with:
          # Persistent runner: preserve target/ across runs.
          clean: false

      - name: Reset workspace, preserve target/ build cache
        run: |
          git reset --hard
          git clean -ffdx -e target

      - name: Run Scout
        # Pinned to the immutable v1.1.0 release tag (NOT the moving v1 tag): self-hosted
        # runners cache action checkouts under _work/_actions, so a moved tag can serve a
        # stale build — an immutable release never goes stale and is the right posture for a
        # runner shared with PR code. The action installs the detector toolchain, builds the
        # driver + detectors from its own pinned checkout (no network fetch at analysis time),
        # and uploads the reports automatically as the 'scout-audit-reports' artifact. Gates
        # the PR on Critical findings (Medium/Minor/Enhancement stay advisory); the step also
        # fails if a contract does not analyze cleanly.
        uses: mihaieremia/scout-audit@v1.1.0
        with:
          contracts: |
            contracts/pool
            contracts/controller
            contracts/governance
            contracts/defindex-strategy
          exclude: dos-unexpected-revert-with-storage
          output-format: json
          output-dir: target/scout-audit
          fail-on-severity: critical
          extra-args: "-- --locked"
