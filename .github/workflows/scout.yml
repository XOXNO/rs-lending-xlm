name: Scout Audit

on:
  pull_request:
    branches: [master, main, feat/*, rc/*]
    # Contract-workspace paths only; off-chain services/ have their own build.
    paths:
      - 'contracts/**'
      - 'common/**'
      - 'interfaces/**'
      - 'tests/**'
      - 'certora/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - 'Makefile'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  # Least-privilege: checkout + local tool execution only.
  contents: read

concurrency:
  group: scout-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scout:
    name: Scout Audit (advisory)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v7
        with:
          # Persistent runner: preserve target/ across runs.
          clean: false

      - name: Reset workspace, preserve target/ build cache
        run: |
          git reset --hard
          git clean -ffdx -e target

      # Scout builds its own `detector-helper` (scout-driver) on first use. On the
      # persistent runner that first build is flaky and fails the earliest
      # contracts in the gated run while later ones pass once the driver is cached.
      # Warm the driver here (non-gating) so the gated run below reuses it.
      - name: Warm Scout detector build
        continue-on-error: true
        uses: mihaieremia/scout-audit@26779da2e72880ba77ab796ee7f71a785ba315f3 # v1.3.0
        with:
          contracts: contracts/defindex-strategy
          exclude: dos-unexpected-revert-with-storage
          output-format: json
          output-dir: target/scout-audit-warm
          fail-on-severity: critical
          extra-args: "-- --locked"
          upload-reports: false

      - name: Run Scout
        # Pinned to an immutable commit SHA (not the mutable v1.3.0 tag): a
        # retargeted tag or compromised action repo would otherwise run
        # attacker code on the self-hosted runner.
        uses: mihaieremia/scout-audit@26779da2e72880ba77ab796ee7f71a785ba315f3 # v1.3.0
        with:
          contracts: |
            contracts/pool
            contracts/controller
            contracts/governance
            contracts/defindex-strategy
          exclude: dos-unexpected-revert-with-storage
          output-format: json
          output-dir: target/scout-audit
          fail-on-severity: critical
          extra-args: "-- --locked"
          # Local act runs: act's artifact server predates upload-artifact@v7's
          # API, so skip the upload (reports reach the host via a bind mount).
          upload-reports: ${{ env.ACT != 'true' }}

      # Render the JSON reports as a Markdown summary on the run page. Runs even
      # when the gate above fails (always()), so Critical findings are still
      # visible. The action only uploads JSON + gates; this surfaces the report.
      - name: Scout summary
        if: always()
        shell: bash
        run: python3 scripts/scout-summary.py target/scout-audit >> "$GITHUB_STEP_SUMMARY"
