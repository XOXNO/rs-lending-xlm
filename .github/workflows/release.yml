name: Release Build

# The external stellar-expert/soroban-build-workflow action we previously
# used ships its own stellar-cli, which does not currently set
# `SOROBAN_SDK_BUILD_SYSTEM_SUPPORTS_SPEC_SHAKING_V2` — required by the
# `experimental_spec_shaking_v2` feature that `stellar-access` and
# `stellar-contract-utils` 0.7.0 pin on in `soroban-sdk` 25.3.1. Without
# that env var, the soroban-sdk build script panics before compile.
#
# This workflow installs the same stellar-cli (v26.0.0) used by ci.yml and
# fuzz.yml, which sets the env var correctly. Release WASM is packaged from
# `make wasm-size-check` / artifacts/wasm/deploy/ (same bytes CI gates).

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0)'
        required: true

permissions:
  id-token: write
  contents: write
  attestations: write

env:
  STELLAR_VERSION: '26.0.0'

# Releases and manual dispatches are not cancelled; the testnet-e2e job
# additionally serializes itself with its own concurrency group.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: false

jobs:
  build:
    name: Build release WASM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Pinned to match rust-toolchain.toml so deployed bytes match the
      # toolchain used by CI lint/test runs.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: '1.95'
          targets: wasm32v1-none

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-

      - name: Install stellar-cli
        # Leverages the top-level STELLAR_VERSION env. Script is idempotent
        # and handles GITHUB_PATH for subsequent steps.
        run: bash .github/scripts/install-stellar-cli.sh

      # Same bytes CI gates: optimize, strip spec docs, enforce wasm_size_budget.txt.
      - name: Build deploy artifacts and WASM size budget
        run: make wasm-size-check

      - name: Package release WASM
        run: |
          mkdir -p dist
          cp artifacts/wasm/deploy/controller.wasm dist/controller.wasm
          cp artifacts/wasm/deploy/pool.wasm dist/pool.wasm
          ls -lh dist/*.wasm

      - name: SHA256 checksums
        run: |
          cd dist
          sha256sum controller.wasm > controller.wasm.sha256
          sha256sum pool.wasm > pool.wasm.sha256
          cat controller.wasm.sha256 pool.wasm.sha256

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            dist/controller.wasm
            dist/pool.wasm

      # Untrusted inputs (release tag_name, workflow_dispatch tag input) are
      # moved into env to avoid shell-injection via ${{ }} interpolation in
      # `run:` blocks. See
      # https://github.blog/security/vulnerability-research/how-to-catch-github-actions-workflow-injections-before-attackers-do/
      - name: Upload to release (on published release)
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          gh release upload "$RELEASE_TAG" \
            dist/controller.wasm \
            dist/controller.wasm.sha256 \
            dist/pool.wasm \
            dist/pool.wasm.sha256 \
            --clobber

      - name: Upload to release (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.inputs.tag }}
        run: |
          gh release upload "$RELEASE_TAG" \
            dist/controller.wasm \
            dist/controller.wasm.sha256 \
            dist/pool.wasm \
            dist/pool.wasm.sha256 \
            --clobber

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-wasm
          path: |
            dist/controller.wasm
            dist/controller.wasm.sha256
            dist/pool.wasm
            dist/pool.wasm.sha256
          if-no-files-found: error

  # Live testnet end-to-end: fresh wallets via friendbot, fresh deploy,
  # every endpoint (lifecycle, strategies, flash loans, liquidations,
  # e-mode, isolation, admin, budget-frontier stress) driven by
  # tests/integration. No secrets required — the run funds itself.
  # The job fails unless the run ends with zero unresolved failures; the
  # markdown report (tx hash + resource usage per action) is uploaded as an
  # artifact and attached to the release.
  testnet-e2e:
    name: Testnet e2e
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 120
    # Serialize runs: parallel e2e runs against the shared testnet
    # aggregator/venues race each other's swaps.
    concurrency:
      group: testnet-e2e
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: '1.95'
          targets: wasm32v1-none

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-

      - name: Install stellar-cli
        # Leverages the top-level STELLAR_VERSION env. Script is idempotent
        # and handles GITHUB_PATH for subsequent steps.
        run: bash .github/scripts/install-stellar-cli.sh

      - name: Install harness tools
        run: sudo apt-get update -q && sudo apt-get install -y -q jq xxd

      # Deploy-sized controller/pool/flash receiver + optimized oracle mocks.
      - name: Build integration WASM
        run: make integration-wasm

      - name: Run live testnet e2e
        env:
          RUN_TS: release-${{ github.run_id }}
        run: bash tests/integration/scenarios/full_e2e.sh

      - name: Assert run is green
        if: always()
        env:
          RUN_TS: release-${{ github.run_id }}
        run: bash tests/integration/scenarios/assert_green.sh

      - name: Upload e2e report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: testnet-e2e-report
          path: |
            tests/integration/runs/release-${{ github.run_id }}/report.md
            tests/integration/runs/release-${{ github.run_id }}/actions.tsv
          if-no-files-found: error

      - name: Attach report to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RUN_TS: release-${{ github.run_id }}
        run: |
          cp "tests/integration/runs/${RUN_TS}/report.md" "testnet-e2e-report-${RELEASE_TAG}.md"
          gh release upload "$RELEASE_TAG" \
            "testnet-e2e-report-${RELEASE_TAG}.md" \
            --clobber
