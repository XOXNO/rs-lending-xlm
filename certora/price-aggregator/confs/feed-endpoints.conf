{
    "msg": "Price aggregator single and bulk feed bounds",
    "optimistic_loop": false,
    "precise_bitwise_ops": false,
    "loop_iter": "32",
    "rule_sanity": "basic",
    "multi_assert_check": true,
    "rule": [
        "single_price_respects_configured_sanity_bounds",
        "bulk_prices_contains_each_requested_asset"
    ],
    "server": "prover",
    "cargo_features": [
        "certora",
        "certora-focused",
        "certora-oracle-rules"
    ],
    "prover_args": [
        "-depth 10",
        "-mediumTimeout 20",
        "-maxBlockCount 400000",
        "-maxCommandCount 2000000",
        "-splitParallel true"
    ],
    "independent_satisfy": true,
    "smt_timeout": "1800",
    "global_timeout": "7200",
    "files": [
        "../../../artifacts/wasm/certora/price-aggregator-oracle-rules.wasm"
    ]
}
