{
    "msg": "Price aggregator tolerance-band blending",
    "optimistic_loop": false,
    "precise_bitwise_ops": false,
    "loop_iter": "6",
    "rule_sanity": "basic",
    "multi_assert_check": true,
    "rule": [
        "first_band_price_within_inputs",
        "second_band_price_within_inputs",
        "beyond_band_price_within_inputs"
    ],
    "server": "prover",
    "cargo_features": [
        "certora",
        "certora-focused",
        "certora-oracle-rules"
    ],
    "prover_args": [
        "-depth 5",
        "-mediumTimeout 20",
        "-maxBlockCount 150000",
        "-maxCommandCount 750000",
        "-splitParallel true"
    ],
    "independent_satisfy": true,
    "smt_timeout": "900",
    "global_timeout": "3600",
    "files": [
        "../../../artifacts/wasm/certora/price-aggregator-oracle-rules.wasm"
    ]
}
