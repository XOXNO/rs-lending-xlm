{
    "msg": "Price aggregator timestamp freshness boundaries",
    "optimistic_loop": false,
    "precise_bitwise_ops": false,
    "loop_iter": "1",
    "rule_sanity": "basic",
    "multi_assert_check": true,
    "rule": [
        "exact_staleness_boundary_is_fresh",
        "one_second_past_staleness_boundary_is_stale",
        "timestamp_at_future_skew_boundary_is_allowed",
        "timestamp_beyond_future_skew_reverts"
    ],
    "server": "prover",
    "cargo_features": [
        "certora",
        "certora-focused",
        "certora-freshness-rules"
    ],
    "prover_args": [
        "-depth 5",
        "-mediumTimeout 20",
        "-maxBlockCount 150000",
        "-maxCommandCount 750000",
        "-splitParallel true"
    ],
    "independent_satisfy": true,
    "smt_timeout": "900",
    "global_timeout": "3600",
    "files": [
        "../../../artifacts/wasm/certora/price-aggregator-freshness-rules.wasm"
    ]
}
