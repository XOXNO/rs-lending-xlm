{
    "msg": "Common interest-index bounds",
    "optimistic_loop": false,
    "precise_bitwise_ops": false,
    "loop_iter": "8",
    "rule_sanity": "basic",
    "multi_assert_check": true,
    "rule": [
        "update_borrow_index_monotonic_when_factor_gte_one",
        "update_supply_index_monotonic_when_rewards_positive",
        "update_supply_index_capped",
        "update_borrow_index_capped",
        "update_supply_index_dust_growth_bounded",
        "simulate_indexes_no_time_noop"
    ],
    "server": "prover",
    "cargo_features": [
        "certora",
        "certora-focused",
        "certora-rates-rules"
    ],
    "prover_args": [
        "-depth 5",
        "-mediumTimeout 20",
        "-maxBlockCount 150000",
        "-maxCommandCount 750000",
        "-splitParallel true"
    ],
    "independent_satisfy": true,
    "smt_timeout": "900",
    "global_timeout": "3600",
    "files": [
        "../../../artifacts/wasm/certora/common-rates-rules.wasm"
    ]
}
