{
    "msg": "Common utilization and borrow-rate bounds",
    "optimistic_loop": false,
    "precise_bitwise_ops": false,
    "loop_iter": "1",
    "rule_sanity": "basic",
    "multi_assert_check": true,
    "rule": [
        "utilization_zero_when_supplied_zero",
        "utilization_bounded_when_borrowed_lte_supplied",
        "borrow_rate_per_ms_respects_annual_cap",
        "deposit_rate_zero_when_no_utilization",
        "deposit_rate_not_above_borrow_rate"
    ],
    "server": "prover",
    "cargo_features": [
        "certora",
        "certora-focused",
        "certora-rates-rules"
    ],
    "prover_args": [
        "-depth 5",
        "-mediumTimeout 20",
        "-maxBlockCount 150000",
        "-maxCommandCount 750000",
        "-splitParallel true"
    ],
    "independent_satisfy": true,
    "smt_timeout": "900",
    "global_timeout": "3600",
    "files": [
        "../../../artifacts/wasm/certora/common-rates-rules.wasm"
    ]
}
