{
    "msg": "Common supplier and protocol-fee accounting",
    "optimistic_loop": false,
    "precise_bitwise_ops": false,
    "loop_iter": "1",
    "rule_sanity": "basic",
    "multi_assert_check": true,
    "rule": [
        "protocol_fee_shares_bounded_by_headroom",
        "protocol_fee_shares_matches_divide_in_range",
        "supplier_rewards_plus_fee_equals_accrued_interest"
    ],
    "server": "prover",
    "cargo_features": [
        "certora",
        "certora-focused",
        "certora-rates-rules"
    ],
    "prover_args": [
        "-depth 5",
        "-mediumTimeout 20",
        "-maxBlockCount 150000",
        "-maxCommandCount 750000",
        "-splitParallel true"
    ],
    "independent_satisfy": true,
    "smt_timeout": "900",
    "global_timeout": "3600",
    "files": [
        "../../../artifacts/wasm/certora/common-rates-rules.wasm"
    ]
}
