{
    "msg": "Common fixed-point conversion identities",
    "optimistic_loop": false,
    "precise_bitwise_ops": false,
    "loop_iter": "6",
    "rule_sanity": "basic",
    "multi_assert_check": true,
    "rule": [
        "ray_mul_identity",
        "ray_div_floor_never_exceeds_half_up",
        "ray_asset_roundtrip_preserves_7_decimal_amount",
        "wad_token_roundtrip_preserves_7_decimal_amount",
        "wad_to_ray_preserves_one",
        "bps_apply_to_ray_is_bounded",
        "bps_one_is_identity_on_wad"
    ],
    "server": "prover",
    "cargo_features": [
        "certora",
        "certora-focused",
        "certora-math-rules"
    ],
    "prover_args": [
        "-depth 5",
        "-mediumTimeout 20",
        "-maxBlockCount 150000",
        "-maxCommandCount 750000",
        "-splitParallel true"
    ],
    "independent_satisfy": true,
    "smt_timeout": "900",
    "global_timeout": "3600",
    "files": [
        "../../../artifacts/wasm/certora/common-math-rules.wasm"
    ]
}
