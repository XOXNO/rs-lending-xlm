{
    "msg": "Controller collateral-funded debt repayment",
    "optimistic_loop": false,
    "precise_bitwise_ops": false,
    "loop_iter": "32",
    "rule_sanity": "basic",
    "multi_assert_check": true,
    "rule": [
        "repay_with_collateral_never_increases_positions",
        "repay_with_collateral_full_close_clears_debt"
    ],
    "server": "prover",
    "cargo_features": [
        "certora",
        "certora-focused",
        "certora-strategy-rules"
    ],
    "prover_args": [
        "-depth 15",
        "-mediumTimeout 20",
        "-maxBlockCount 800000",
        "-maxCommandCount 3000000",
        "-splitParallel true",
        "-destructiveOptimizations twostage"
    ],
    "independent_satisfy": true,
    "smt_timeout": "1800",
    "global_timeout": "7200",
    "files": [
        "../../../artifacts/wasm/certora/controller-strategy-rules.wasm"
    ]
}
