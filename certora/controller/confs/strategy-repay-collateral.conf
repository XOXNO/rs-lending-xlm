{
    "msg": "Controller repay-debt-with-collateral (heavy withdraw-swap-repay path)",
    "optimistic_loop": true,
    "precise_bitwise_ops": false,
    "loop_iter": "3",
    "rule_sanity": "basic",
    "rule": [
        "repay_with_collateral_never_increases_positions",
        "repay_with_collateral_full_close_clears_debt",
        "repay_with_collateral_sanity"
    ],
    "server": "prover",
    "cargo_features": [
        "certora"
    ],
    "prover_args": [
        "-maxBlockCount 1000000",
        "-maxCommandCount 5000000",
        "-splitParallel true",
        "-dontStopAtFirstSplitTimeout true",
        "-smt_initialSplitDepth 5",
        "-depth 15"
    ],
    "independent_satisfy": true,
    "smt_timeout": "7200",
    "global_timeout": "7200",
    "files": [
        "../../../artifacts/wasm/certora/controller.wasm"
    ]
}
