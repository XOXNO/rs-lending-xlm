{
    "msg": "Controller borrow and deposit rate curve",
    "optimistic_loop": false,
    "precise_bitwise_ops": false,
    "loop_iter": "1",
    "rule_sanity": "basic",
    "multi_assert_check": true,
    "rule": [
        "borrow_rate_zero_utilization",
        "borrow_rate_monotonic",
        "borrow_rate_capped",
        "borrow_rate_non_decreasing_at_mid_boundary",
        "borrow_rate_non_decreasing_at_optimal_boundary",
        "deposit_rate_zero_when_no_utilization",
        "deposit_rate_less_than_borrow"
    ],
    "server": "prover",
    "cargo_features": [
        "certora",
        "certora-focused",
        "certora-interest-rules"
    ],
    "prover_args": [
        "-depth 5",
        "-mediumTimeout 20",
        "-maxBlockCount 150000",
        "-maxCommandCount 750000",
        "-splitParallel true"
    ],
    "independent_satisfy": true,
    "smt_timeout": "900",
    "global_timeout": "3600",
    "files": [
        "../../../artifacts/wasm/certora/controller-interest-rules.wasm"
    ]
}
