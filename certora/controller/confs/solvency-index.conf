{
    "msg": "Controller solvency - index, cache, and compound interest",
    "optimistic_loop": true,
    "precise_bitwise_ops": false,
    "loop_iter": "3",
    "rule_sanity": "basic",
    "rule": [
        "supply_index_above_floor_after_supply",
        "supply_index_monotonic_across_borrow",
        "supply_index_grows_slower",
        "index_cache_single_snapshot",
        "compound_interest_bounded_output",
        "compound_interest_no_wrap",
        "scaled_to_actual_reconstruction"
    ],
    "server": "prover",
    "cargo_features": [
        "certora"
    ],
    "prover_args": [
        "-maxBlockCount 500000",
        "-maxCommandCount 2000000",
        "-splitParallel true"
    ],
    "independent_satisfy": true,
    "smt_timeout": "1800",
    "global_timeout": "7200",
    "files": [
        "../../../artifacts/wasm/certora/controller.wasm"
    ]
}
