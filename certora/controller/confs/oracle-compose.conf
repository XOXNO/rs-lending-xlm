{
    "msg": "Controller oracle compose and dual-source policy",
    "optimistic_loop": true,
    "precise_bitwise_ops": false,
    "loop_iter": "1",
    "rule_sanity": "basic",
    "rule": [
        "strict_policies_forbid_degraded_dual_source",
        "permissive_policies_allow_degraded_dual_source",
        "fallback_to_primary_succeeds_under_repay_policy",
        "fallback_to_primary_panics_under_liquidation_policy",
        "anchor_stale_unusable_under_repay_policy",
        "anchor_stale_panics_under_liquidation_policy",
        "oracle_compose_reachability"
    ],
    "server": "prover",
    "cargo_features": [
        "certora"
    ],
    "prover_args": [
        "-maxBlockCount 200000"
    ],
    "independent_satisfy": true,
    "smt_timeout": "900",
    "global_timeout": "3600",
    "files": [
        "../../../artifacts/wasm/certora/controller.wasm"
    ]
}
