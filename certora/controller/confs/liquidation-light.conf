    "server": "prover",
    "cargo_features": [
        "certora"
    ],
    "prover_args": [
        "-maxBlockCount 200000",
        "-maxCommandCount 2000000",
        "-splitParallel true",
        "-smt_initialSplitDepth 5",
        "-depth 15"
    ],
    "independent_satisfy": true,
    "smt_timeout": "900",
    "global_timeout": "7200",
    "files": [
        "../../../artifacts/wasm/certora/controller.wasm"
    ]
