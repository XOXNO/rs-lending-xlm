{
    "msg": "Controller recovery direction at one valuation snapshot",
    "optimistic_loop": false,
    "precise_bitwise_ops": false,
    "loop_iter": "32",
    "rule_sanity": "basic",
    "multi_assert_check": true,
    "rule": [
        "unhealthy_repay_improves_frozen_valuation_components",
        "unhealthy_supply_improves_frozen_valuation_components"
    ],
    "server": "prover",
    "cargo_features": [
        "certora",
        "certora-focused",
        "certora-health-rules"
    ],
    "prover_args": [
        "-depth 10",
        "-mediumTimeout 20",
        "-maxBlockCount 400000",
        "-maxCommandCount 2000000",
        "-splitParallel true"
    ],
    "independent_satisfy": true,
    "smt_timeout": "1800",
    "global_timeout": "7200",
    "files": [
        "../../../artifacts/wasm/certora/controller-health-rules.wasm"
    ]
}
