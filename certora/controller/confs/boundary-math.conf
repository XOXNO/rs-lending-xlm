{
    "msg": "Controller decimal-math boundary results",
    "optimistic_loop": false,
    "precise_bitwise_ops": false,
    "loop_iter": "8",
    "rule_sanity": "basic",
    "multi_assert_check": true,
    "rule": [
        "mul_at_max_i128",
        "compound_taylor_accuracy",
        "rescale_ray_to_wad",
        "rescale_wad_to_7_decimals"
    ],
    "server": "prover",
    "cargo_features": [
        "certora",
        "certora-focused",
        "certora-boundary-rules"
    ],
    "prover_args": [
        "-depth 5",
        "-mediumTimeout 20",
        "-maxBlockCount 150000",
        "-maxCommandCount 750000",
        "-splitParallel true"
    ],
    "independent_satisfy": true,
    "smt_timeout": "900",
    "global_timeout": "3600",
    "files": [
        "../../../artifacts/wasm/certora/controller-boundary-rules.wasm"
    ]
}
