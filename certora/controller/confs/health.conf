{
    "msg": "Controller health-factor gates",
    "optimistic_loop": true,
    "precise_bitwise_ops": false,
    "loop_iter": "3",
    "rule_sanity": "basic",
    "rule": [
        "hf_safe_after_borrow",
        "hf_safe_after_withdraw",
        "liquidation_requires_unhealthy_account",
        "supply_cannot_decrease_hf",
        "hf_borrow_sanity",
        "hf_withdraw_sanity",
        "hf_safe_after_multiply",
        "hf_safe_after_swap_debt",
        "hf_safe_after_swap_collateral",
        "hf_multiply_sanity",
        "unhealthy_repay_only_improves",
        "unhealthy_supply_only_improves",
        "threshold_downgrade_implies_account_safe"
    ],
    "server": "prover",
    "cargo_features": [
        "certora"
    ],
    "prover_args": [
        "-maxBlockCount 300000",
        "-splitParallel true",
        "-smt_initialSplitDepth 5",
        "-depth 15",
        "-dontStopAtFirstSplitTimeout true",
        "-maxCommandCount 4000000"
    ],
    "independent_satisfy": true,
    "smt_timeout": "900",
    "global_timeout": "7200",
    "files": [
        "../../../artifacts/wasm/certora/controller.wasm"
    ]
}