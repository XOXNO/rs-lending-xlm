{
    "msg": "Controller solvency - borrow, LTV, and debt limits",
    "optimistic_loop": true,
    "precise_bitwise_ops": false,
    "loop_iter": "3",
    "rule_sanity": "basic",
    "rule": [
        "borrow_respects_reserves",
        "ltv_borrow_bound_enforced",
        "isolation_debt_never_negative_after_repay",
        "borrow_rejects_zero_amount",
        "repay_rejects_zero_amount",
        "borrow_position_limit_enforced",
        "borrow_respects_borrow_cap"
    ],
    "server": "prover",
    "cargo_features": [
        "certora"
    ],
    "prover_args": [
        "-maxBlockCount 500000",
        "-maxCommandCount 2000000",
        "-splitParallel true"
    ],
    "independent_satisfy": true,
    "smt_timeout": "1800",
    "global_timeout": "7200",
    "files": [
        "../../../artifacts/wasm/certora/controller.wasm"
    ]
}
