{
    "msg": "Controller borrow LTV and position limits",
    "optimistic_loop": false,
    "precise_bitwise_ops": false,
    "loop_iter": "32",
    "rule_sanity": "basic",
    "multi_assert_check": true,
    "rule": [
        "ltv_borrow_bound_enforced",
        "borrow_rejects_zero_amount",
        "borrow_position_limit_enforced"
