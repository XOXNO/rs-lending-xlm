{
    "msg": "Controller bit-precise rounding error bounds",
    "optimistic_loop": false,
    "precise_bitwise_ops": true,
    "loop_iter": "6",
    "rule_sanity": "basic",
    "multi_assert_check": true,
    "rule": [
        "div_half_up_roundtrip_error_bounded",
        "mul_half_up_rounding_direction",
        "div_half_up_rounding_direction"
    ],
    "server": "prover",
    "cargo_features": [
        "certora",
        "certora-focused",
        "certora-math-rules"
    ],
    "prover_args": [
        "-depth 15",
        "-mediumTimeout 20",
        "-maxBlockCount 800000",
        "-maxCommandCount 3000000",
        "-destructiveOptimizations twostage"
    ],
    "independent_satisfy": true,
    "smt_timeout": "1800",
    "global_timeout": "7200",
    "files": [
        "../../../artifacts/wasm/certora/controller-math-rules.wasm"
    ]
}
