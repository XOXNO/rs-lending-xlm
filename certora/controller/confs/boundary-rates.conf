{
    "msg": "Controller rate-curve boundary reachability",
    "optimistic_loop": false,
    "precise_bitwise_ops": false,
    "loop_iter": "1",
    "rule_sanity": "none",
    "multi_assert_check": false,
    "rule": [
        "borrow_rate_at_100_percent_sanity",
        "borrow_rate_at_exact_mid_sanity",
        "borrow_rate_at_exact_optimal_sanity",
        "borrow_rate_at_exact_zero_sanity"
    ],
    "server": "prover",
    "cargo_features": [
        "certora",
        "certora-focused",
        "certora-boundary-rules"
    ],
    "prover_args": [
        "-depth 5",
        "-mediumTimeout 20",
        "-maxBlockCount 150000",
        "-maxCommandCount 750000",
        "-splitParallel true",
        "-dontStopAtFirstSplitTimeout true"
    ],
    "independent_satisfy": true,
    "smt_timeout": "900",
    "global_timeout": "3600",
    "files": [
        "../../../artifacts/wasm/certora/controller-boundary-rules.wasm"
    ]
}
