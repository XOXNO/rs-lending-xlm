{
    "msg": "Controller fixed-point algebra",
    "optimistic_loop": false,
    "precise_bitwise_ops": false,
    "loop_iter": "6",
    "rule_sanity": "basic",
    "multi_assert_check": true,
    "rule": [
        "mul_half_up_commutative",
        "mul_half_up_zero",
        "mul_half_up_identity",
        "div_half_up_zero_numerator",
        "rescale_upscale_lossless",
        "rescale_roundtrip",
        "i256_no_overflow",
        "div_by_zero_sanity"
    ],
    "server": "prover",
    "cargo_features": [
        "certora",
        "certora-focused",
        "certora-math-rules"
    ],
    "prover_args": [
        "-depth 5",
        "-mediumTimeout 20",
        "-maxBlockCount 150000",
        "-maxCommandCount 750000",
        "-splitParallel true"
    ],
    "independent_satisfy": true,
    "smt_timeout": "900",
    "global_timeout": "3600",
    "files": [
        "../../../artifacts/wasm/certora/controller-math-rules.wasm"
    ]
}
