{
    "msg": "Controller spoke supply and borrow reachability",
    "optimistic_loop": false,
    "precise_bitwise_ops": false,
    "loop_iter": "32",
    "rule_sanity": "none",
    "multi_assert_check": false,
    "rule": [
        "spoke_supply_sanity",
        "spoke_borrow_sanity",
        "deprecated_spoke_withdraw_sanity"
    ],
    "server": "prover",
    "cargo_features": [
        "certora",
        "certora-focused",
        "certora-spoke-rules"
    ],
    "prover_args": [
        "-depth 10",
        "-mediumTimeout 20",
        "-maxBlockCount 400000",
        "-maxCommandCount 2000000",
        "-splitParallel true",
        "-dontStopAtFirstSplitTimeout true"
    ],
    "independent_satisfy": true,
    "smt_timeout": "1800",
    "global_timeout": "7200",
    "files": [
        "../../../artifacts/wasm/certora/controller-spoke-rules.wasm"
    ]
}
