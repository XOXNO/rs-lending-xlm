{
    "msg": "Controller account isolation (frame rules)",
    "optimistic_loop": true,
    "loop_iter": "3",
    "rule_sanity": "basic",
    "rule": [
        "supply_does_not_change_other_account_positions",
        "borrow_does_not_change_other_account_positions",
        "repay_only_changes_target_account_debt",
        "liquidation_does_not_change_other_account_positions",
        "account_isolation_reachability"
    ],
    "server": "prover",
    "cargo_features": [
        "certora"
    ],
    "prover_args": [
        "-maxBlockCount 300000",
        "-splitParallel true",
        "-dontStopAtFirstSplitTimeout true"
    ],
    "independent_satisfy": true,
    "smt_timeout": "900",
    "global_timeout": "3600",
    "files": [
        "../../../artifacts/wasm/certora/controller.wasm"
    ]
}