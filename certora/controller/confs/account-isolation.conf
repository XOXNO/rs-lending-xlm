{
    "msg": "Controller account isolation",
    "optimistic_loop": true,
    "precise_bitwise_ops": false,
    "loop_iter": "3",
    "rule_sanity": "basic",
    "rule": [
        "supply_does_not_change_other_account_positions",
        "borrow_does_not_change_other_account_positions",
        "repay_only_changes_target_account_debt",
        "account_isolation_reachability"
    ],
    "server": "prover",
    "cargo_features": [
        "certora"
    ],
    "prover_args": [
        "-maxBlockCount 500000",
        "-maxCommandCount 2000000"
    ],
    "independent_satisfy": true,
    "smt_timeout": "1800",
    "global_timeout": "7200",
    "files": [
        "../../../artifacts/wasm/certora/controller.wasm"
    ]
}
