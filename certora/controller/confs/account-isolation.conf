{
    "msg": "Controller account frame properties",
    "optimistic_loop": false,
    "precise_bitwise_ops": false,
    "loop_iter": "32",
    "rule_sanity": "basic",
    "multi_assert_check": true,
    "rule": [
        "supply_does_not_change_other_account_positions",
        "borrow_does_not_change_other_account_positions",
        "repay_only_changes_target_account_debt",
        "liquidation_does_not_change_other_account_positions"
    ],
    "server": "prover",
    "cargo_features": [
        "certora",
        "certora-focused",
        "certora-account-isolation-rules"
    ],
    "prover_args": [
        "-depth 10",
        "-mediumTimeout 20",
        "-maxBlockCount 400000",
        "-maxCommandCount 2000000",
        "-splitParallel true"
    ],
    "independent_satisfy": true,
    "smt_timeout": "1800",
    "global_timeout": "7200",
    "files": [
        "../../../artifacts/wasm/certora/controller-account-isolation-rules.wasm"
    ]
}
