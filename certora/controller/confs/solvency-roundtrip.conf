{
    "msg": "Controller solvency - roundtrips, mode transitions, and sanity",
    "optimistic_loop": true,
    "precise_bitwise_ops": false,
    "loop_iter": "3",
    "rule_sanity": "basic",
    "rule": [
        "supply_withdraw_roundtrip_no_profit",
        "borrow_repay_roundtrip_no_profit",
        "price_cache_invalidation_after_swap",

        "solvency_sanity_supply",
        "solvency_sanity_borrow",
        "solvency_sanity_repay",
        "compound_no_wrap_sanity",
        "index_cache_snapshot_sanity",
        "roundtrip_supply_sanity"
    ],
    "server": "prover",
    "cargo_features": [
        "certora"
    ],
    "prover_args": [
        "-maxBlockCount 500000",
        "-maxCommandCount 2000000",
        "-splitParallel true",
        "-smt_initialSplitDepth 5",
        "-depth 15"
    ],
    "independent_satisfy": true,
    "smt_timeout": "1800",
    "global_timeout": "7200",
    "files": [
        "../../../artifacts/wasm/certora/controller.wasm"
    ]
}
