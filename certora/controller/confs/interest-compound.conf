{
    "msg": "Controller compound-interest monotonicity",
    "optimistic_loop": false,
    "precise_bitwise_ops": false,
    "loop_iter": "8",
    "rule_sanity": "basic",
    "multi_assert_check": true,
    "rule": [
        "compound_interest_identity",
        "compound_interest_monotonic_in_time",
        "compound_interest_monotonic_in_rate",
        "compound_interest_ge_simple"
    ],
    "server": "prover",
    "cargo_features": [
        "certora",
        "certora-focused",
        "certora-interest-rules"
    ],
    "prover_args": [
        "-depth 5",
        "-mediumTimeout 20",
        "-maxBlockCount 150000",
        "-maxCommandCount 750000",
        "-splitParallel true"
    ],
    "independent_satisfy": true,
    "smt_timeout": "900",
    "global_timeout": "3600",
    "files": [
        "../../../artifacts/wasm/certora/controller-interest-rules.wasm"
    ]
}
