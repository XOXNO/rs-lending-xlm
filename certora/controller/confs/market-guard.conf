{
    "msg": "Controller market entry rejection gates",
    "optimistic_loop": false,
    "precise_bitwise_ops": false,
    "loop_iter": "32",
    "rule_sanity": "basic",
    "multi_assert_check": true,
    "rule": [
        "no_collateral_account_cannot_borrow",
        "disabled_market_blocks_new_supply",
        "supply_new_slot_requires_owner_or_delegate"
    ],
    "server": "prover",
    "cargo_features": [
        "certora",
        "certora-focused",
        "certora-market-guard-rules"
    ],
    "prover_args": [
        "-depth 10",
        "-mediumTimeout 20",
        "-maxBlockCount 400000",
        "-maxCommandCount 2000000",
        "-splitParallel true"
    ],
    "independent_satisfy": true,
    "smt_timeout": "1800",
    "global_timeout": "7200",
    "files": [
        "../../../artifacts/wasm/certora/controller-market-guard-rules.wasm"
    ]
}
