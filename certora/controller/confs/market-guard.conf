{
    "msg": "Controller market entry guards",
    "optimistic_loop": true,
    "precise_bitwise_ops": false,
    "loop_iter": "3",
    "rule_sanity": "basic",
    "rule": [
        "no_collateral_account_cannot_borrow",
        "disabled_market_blocks_new_supply",
        "pending_oracle_market_blocks_new_borrow",
        "market_guard_reachability"
    ],
    "server": "prover",
    "cargo_features": [
        "certora"
    ],
    "prover_args": [
        "-maxBlockCount 500000",
        "-maxCommandCount 2000000",
        "-splitParallel true",
        "-smt_initialSplitDepth 5",
        "-depth 15"
    ],
    "independent_satisfy": true,
    "smt_timeout": "1800",
    "global_timeout": "7200",
    "files": [
        "../../../artifacts/wasm/certora/controller.wasm"
    ]
}
