{
    "msg": "Controller spoke listing and risk-parameter gates",
    "optimistic_loop": false,
    "precise_bitwise_ops": false,
    "loop_iter": "32",
    "rule_sanity": "basic",
    "multi_assert_check": true,
    "rule": [
        "spoke_only_registered_assets",
        "spoke_borrow_only_registered_assets",
        "spoke_only_borrowable_assets",
        "spoke_only_collateralizable_assets",
        "deprecated_spoke_blocks_new_supply",
        "deprecated_spoke_blocks_new_borrow",
        "deprecated_spoke_withdraw_does_not_increase_supply",
        "spoke_overrides_asset_params",
        "add_asset_enforces_valid_bounds",
        "edit_asset_enforces_valid_bounds",
        "spoke_remove_category",
        "spoke_add_asset_to_deprecated_category"
    ],
    "server": "prover",
    "cargo_features": [
        "certora",
        "certora-focused",
        "certora-spoke-rules"
    ],
    "prover_args": [
        "-depth 10",
        "-mediumTimeout 20",
        "-maxBlockCount 400000",
        "-maxCommandCount 2000000",
        "-splitParallel true"
    ],
    "independent_satisfy": true,
    "smt_timeout": "1800",
    "global_timeout": "7200",
    "files": [
        "../../../artifacts/wasm/certora/controller-spoke-rules.wasm"
    ]
}
