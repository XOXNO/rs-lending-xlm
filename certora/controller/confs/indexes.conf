{
    "msg": "Controller zero-time index stability",
    "optimistic_loop": false,
    "precise_bitwise_ops": false,
    "loop_iter": "8",
    "rule_sanity": "basic",
    "multi_assert_check": true,
    "rule": [
        "indexes_unchanged_when_no_time_elapsed"
    ],
    "server": "prover",
    "cargo_features": [
        "certora",
        "certora-focused",
        "certora-index-rules"
    ],
    "prover_args": [
        "-depth 10",
        "-mediumTimeout 20",
        "-maxBlockCount 400000",
        "-maxCommandCount 2000000",
        "-splitParallel true"
    ],
    "independent_satisfy": true,
    "smt_timeout": "1800",
    "global_timeout": "7200",
    "files": [
        "../../../artifacts/wasm/certora/controller-index-rules.wasm"
    ]
}
