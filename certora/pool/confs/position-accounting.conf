{
  "msg": "Pool supply borrow withdraw repay accounting",
  "files": [
    "../../../artifacts/wasm/certora/pool-position-accounting-rules.wasm"
  ],
  "cargo_features": [
    "certora",
    "certora-focused",
    "certora-position-accounting-rules"
  ],
  "rule": [
    "supply_scaled_balance_matches_index",
    "borrow_scaled_debt_matches_index",
    "partial_withdraw_burns_scaled_supply",
    "full_withdraw_burns_entire_position",
    "partial_repay_burns_scaled_debt",
    "full_repay_refunds_overpayment"
  ],
  "server": "prover",
  "optimistic_loop": false,
  "loop_iter": "32",
  "precise_bitwise_ops": false,
  "rule_sanity": "basic",
  "multi_assert_check": true,
  "independent_satisfy": true,
  "smt_timeout": "1800",
  "global_timeout": "7200",
  "prover_args": [
    "-depth 10",
    "-mediumTimeout 20",
    "-maxBlockCount 400000",
    "-maxCommandCount 2000000",
    "-splitParallel true"
  ]
}
