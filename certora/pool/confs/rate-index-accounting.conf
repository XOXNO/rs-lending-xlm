{
  "msg": "Pool kink rates and index monotonicity",
  "files": [
    "../../../artifacts/wasm/certora/pool-rate-index-accounting-rules.wasm"
  ],
  "cargo_features": [
    "certora",
    "certora-focused",
    "certora-rate-index-accounting-rules"
  ],
  "rule": [
    "borrow_rate_monotonic_across_utilization",
    "borrow_rate_kinks_match_configured_curve",
    "deposit_rate_respects_utilization_and_reserve",
    "compound_factor_never_below_one",
    "borrow_index_grows_and_respects_cap",
    "supply_index_zero_inputs_are_noop",
    "supply_index_rounded_zero_value_is_noop",
    "supply_index_positive_rewards_grow_and_respect_cap",
    "accrued_interest_split_is_conservative",
    "utilization_respects_supply_ratio"
  ],
  "server": "prover",
  "optimistic_loop": false,
  "loop_iter": "8",
  "precise_bitwise_ops": false,
  "rule_sanity": "basic",
  "multi_assert_check": true,
  "independent_satisfy": true,
  "smt_timeout": "900",
  "global_timeout": "3600",
  "prover_args": [
    "-depth 5",
    "-mediumTimeout 20",
    "-maxBlockCount 300000",
    "-maxCommandCount 1500000",
    "-splitParallel true",
    "-destructiveOptimizations twostage"
  ]
}
