# cargo-mutants config — excludes code that has no behavior to mutate.
#
# `mutants.rs` semantics:
#   - `exclude_globs` skips entire files matching the glob.
#   - `exclude_re`     skips individual mutations whose generated diff line
#                      matches the regex.
#
# Selection lives on the CLI (`--file`, `--package`) so this file only
# encodes "never mutate this regardless of scope" rules.

exclude_globs = [
    # Compile-time ABI guards — pure type-pointer bindings, no behavior.
    "contracts/controller/src/abi.rs",
    "contracts/pool/src/abi.rs",

    # Test scaffolding — mutating tests just produces noise.
    "tests/test-harness/**",
    "tests/fuzz/**",
    "certora/**",
    "**/test_support.rs",
    "**/tests.rs",

    # Top-level orchestration shells — mostly re-exports and module declarations.
    "**/lib.rs",
    "**/mod.rs",
    "**/router.rs",

    # Strict type-alias / re-export files (no executable lines worth mutating).
    "common/src/types/shared.rs",
    "common/src/types/aggregator.rs",
]

# Drop mutations on non-behavioral patterns:
#   - Default::default() replacements on `()` returning fns (always equivalent).
#   - Deleting / replacing trivial accessors (getters that just `clone()`).
exclude_re = [
    # `replace .* with Default::default()` on unit-returning fns.
    "replace .* -> \\(\\) with \\(\\)",

    # Provably-equivalent boundary mutants (equality pre-handled or symmetric at 0):
    "replace < with <= in Wad::min",
    "replace > with >= in Wad::max",
    "replace > with >= in rescale_half_up",
    "replace > with >= in rescale_floor",
    "replace > with >= in rescale_ceil",
    "replace < with <= in mul_div_half_up_signed",
    # `is_stale` first guard: at now == feed_ts elapsed is 0, never > max_stale,
    # so `>` vs `>=` is unobservable. Col-anchored to spare the killable :30:48.
    "observation.rs:30:14: replace > with >= in is_stale",
]
