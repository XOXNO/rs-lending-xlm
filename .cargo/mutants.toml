# cargo-mutants config — excludes code that has no behavior to mutate.
#
# `mutants.rs` semantics:
#   - `exclude_globs` skips entire files matching the glob.
#   - `exclude_re`     skips individual mutations whose generated diff line
#                      matches the regex.
#
# Selection lives on the CLI (`--file`, `--package`) so this file only
# encodes "never mutate this regardless of scope" rules.
#
# KNOWN BLIND SPOT: cargo-mutants cannot mutate inside macro arguments, so
# every comparison written inside `assert_with_error!(env, <cond>, Err)` (and
# `#[contractevent]` internals) generates NO operator mutants — only a
# whole-function deletion mutant. Guard *existence* is mutation-tested; guard
# *boundary precision* (`<=` vs `<`, operand order) is not. Do not read
# "0 missed" as boundary coverage for those guards; the compensating control
# is explicit unit tests at exact boundary values.

# Keep ignored build products, generated snapshots, local worktrees, and
# verification artifacts out of cargo-mutants scratch copies.
gitignore = true

exclude_globs = [
    # Test scaffolding — mutating tests just produces noise.
    "tests/test-harness/**",
    "tests/fuzz/**",
    # Cargo discovers these through relative #[path] modules such as
    # `contracts/pool/src/../../../certora/...`, so the leading ** is required.
    "**/certora/**",
    "**/test_support.rs",
    "**/tests.rs",

    # Strict type-alias / re-export files (no executable lines worth mutating).
    "common/src/types/shared.rs",
    "common/src/types/aggregator.rs",
]

# Drop only mutations proven equivalent or confined to test support.
exclude_re = [
    "test_support::",

    # Eager strategy prefetch only warms the same transaction cache that the
    # final portfolio-risk pass bulk-prefetches before reading. Removing this
    # call intentionally leaves results and adapter call counts unchanged.
    "replace prefetch_strategy_oracles with \\(\\)",

    # At primary / anchor == u32::MAX, BPS scaling already puts the ratio
    # above every representable u32 tolerance band. Both branches therefore
    # reject the price in calculate_final_price.
    "replace > with >= in anchor_ratio_bps",

    # Reassigning oldest_ts when the next timestamp is equal stores the same
    # value and cannot affect freshness or the returned observation.
    "reflector.rs:[0-9]+:25: replace < with <= in read_twap",

    # A zero revenue claim reaches only `transfer_out(..., 0)`, whose explicit
    # nonpositive guard returns without a token call; the pool owner is set by
    # the constructor, so entering the branch at equality is unobservable.
    "replace > with >= in <impl LiquidityPoolInterface for LiquidityPool>::claim_revenue",

    # Provably-equivalent boundary mutants (equality pre-handled or symmetric at 0):
    "replace < with <= in Wad::min",
    "replace > with >= in Wad::max",
    "replace > with >= in rescale_half_up",
    "replace > with >= in rescale_floor",
    "replace > with >= in rescale_ceil",
    "replace < with <= in mul_div_half_up_signed",
    # `is_stale` first guard: at now == feed_ts elapsed is 0, never > max_stale,
    # so `>` vs `>=` is unobservable. Column-anchored to spare the killable
    # second comparison while remaining stable when preceding lines move.
    "observation.rs:[0-9]+:14: replace > with >= in is_stale",

    # `calculate_borrow_rate` / `update_borrow_index` cap clamps: same
    # equivalent-at-boundary shape as the pool clamps above.
    "replace > with >= in calculate_borrow_rate",
    "replace > with >= in update_borrow_index",

    # `normalize_repayment_plan` excess gate: `max_debt_to_repay_usd` is
    # `min(total, ideal)`, so at equality the excess is zero and
    # `process_excess_payment` with a zero excess is a proven no-op (its
    # `remaining > ZERO` loop guard never admits an iteration). `>` vs `>=`
    # therefore cannot change any output.
    "replace > with >= in normalize_repayment_plan",

    # `prefetch_market_indexes` dedup skip (`cached || seen`): weakening the
    # skip only re-requests indexes that are already cached or duplicated in
    # the batch. The pool returns identical values within the same
    # transaction, and re-setting a map key with the same value is
    # unobservable — the mutant changes cost, never results.
    "replace \\|\\| with && in Cache::prefetch_market_indexes",

    # `settle_partial_max` is a bounded step-optimizer over
    # `binary_search_partial` on a monotone feasibility predicate
    # (`partial_ok` only tightens as the amount grows). Only the mutants
    # below are excluded, each with its own equivalence argument; the
    # zero guard, both `!` negations, the `amount + 1` probes, and the
    # post-loop `>`/`==` shapes all stay mutated and are killed by the
    # settle seed tests.
    # Downward-walk step mutants degrade to the post-loop binary-search
    # fallback: a wrong step leaves `amount` infeasible, the `!partial_ok`
    # re-check catches it, and the fallback returns the same maximum.
    "replace -= with \\+= in settle_partial_max",
    "replace -= with /= in settle_partial_max",
    # Upward-walk step mutants degrade to the post-loop check: a wrong step
    # leaves `amount` feasible-but-short (or loops to the step cap), and the
    # `amount < ceiling && partial_ok(amount + 1)` re-check routes to the
    # binary-search fallback with the same result.
    "replace \\+= with -= in settle_partial_max",
    "replace \\+= with \\*= in settle_partial_max",
    # While-loop guards only (columns 18 and 37 on the `while` line): the
    # post-loop re-check recovers a skipped or shortened walk via the
    # fallback, so only the iteration count changes. The post-loop `<` at
    # column 15 is NOT excluded — weakening it returns an under-walked
    # amount when the analytic seed is short (killed by
    # `settle_recovers_from_underseeded_candidate`). Likewise the zero
    # guard (`==` at col 19), both `!` negations, and the `amount + 1`
    # probes stay mutated: the zero-guard mutant can walk negative and
    # return a negative withdrawal on a dust-underwater account, and the
    # probe/negation mutants overshoot the maximum (killed by the settle
    # seed tests).
    "withdraw.rs:[0-9]+:18: replace < with <= in settle_partial_max",
    "withdraw.rs:[0-9]+:18: replace < with == in settle_partial_max",
    "withdraw.rs:[0-9]+:18: replace < with > in settle_partial_max",
    "withdraw.rs:[0-9]+:37: replace < with <= in settle_partial_max",
    "withdraw.rs:[0-9]+:37: replace < with == in settle_partial_max",
    "withdraw.rs:[0-9]+:37: replace < with > in settle_partial_max",
    # Post-loop re-check `<` -> `<=` only differs at amount == ceiling,
    # where the probe amount+1 equals the full request whose full close
    # max_withdraw already rejected, so partial_ok is false and both
    # shapes skip the fallback identically. The `>`/`==` shapes at the
    # same column stay mutated (killed by the under-seeded settle test).
    "withdraw.rs:[0-9]+:15: replace < with <= in settle_partial_max",
    "replace && with \\|\\| in settle_partial_max",

    # `max_withdraw`'s debt-free refresh guard: for a debt-free account the
    # refreshed risk params are never read (the account gates are trivially
    # true and the risk caps are skipped), so running the refresh anyway
    # cannot change the preview. Its panic path needs a supply position on
    # an asset the spoke no longer lists, which the zero-usage delist gate
    # makes unreachable.
    "delete ! in max_withdraw",

    # Preview binary-search break guards (`if lo >= hi break`): the loop
    # maintains `lo <= hi` (mid >= lo + 1, so `hi = mid.saturating_sub(1)`
    # never drops below `lo`), making `>` and `==` coincide with `>=` on
    # every reachable state; with the iteration cap the search then exits at
    # the same fixed point, so only the iteration count changes. The `<`
    # replacement breaks immediately and stays killed.
    "replace >= with > in max_borrow",
    "replace >= with == in max_borrow",
    "replace >= with > in binary_search_partial",
    "replace >= with == in binary_search_partial",

    # `risk_partial_cap` zero-slack shortcuts: when exactly one slack is
    # zero, the corresponding per-cap arm already yields 0 and the final
    # `min` reproduces the early return, so the combined guard's shape is
    # unobservable. Column-anchored so the killable slack/ratio comparisons
    # on the same lines stay mutated. The HF-arm `||` (col 35) is excluded
    # because its ratio is the position's liquidation threshold, which
    # `validate_risk_bounds` pins strictly above LTV (>= 0), so a zero
    # threshold is unreachable. The LTV-arm `||` (col 37) is deliberately
    # NOT excluded: LTV 0 is a valid listing, and with slack contributed by
    # other collateral the mutant divides by the zero ratio — killed by
    # `risk_partial_cap_zero_ltv_position_caps_at_zero`.
    "replace && with \\|\\| in risk_partial_cap",
    "withdraw.rs:[0-9]+:18: replace == with != in risk_partial_cap",
    "withdraw.rs:[0-9]+:35: replace == with != in risk_partial_cap",
    "withdraw.rs:[0-9]+:35: replace \\|\\| with && in risk_partial_cap",

    # Oracle-adapter insertion-sort comparator over i128 prices: `>=` vs `>`
    # only changes which of two EQUAL elements shifts first, i.e. sort
    # stability. Equal i128 values are indistinguishable, so the output
    # vector is value-identical and the downstream median cannot differ.
    # Column-anchored to spare the killable `j > 0` loop guard on the same
    # line while remaining stable when preceding lines move.
    "aggregation.rs:[0-9]+:51: replace > with >= in sorted_copy",

    # `update_supply_index`'s `supplied == ZERO || rewards_increase == ZERO`
    # short-circuit: mutating `||` to `&&` only changes behavior when
    # exactly one side is zero, and in both single-zero cases a downstream
    # check (`total_supplied_value == ZERO`) or identity math
    # (`0.div(x) == 0`, then `old_index.mul(ONE) == old_index`) reproduces
    # the same result, so the branch choice is unobservable.
    "replace \\|\\| with && in update_supply_index",

    # Aggregator vault negative-amount guards (`amount < 0`): the preceding
    # `amount == 0` early-return makes 0 unreachable at the comparison, so
    # `<` and `<=` agree on every reachable input. Column-anchored to :19 so
    # the killable `current < amount` overdraw check (col 20) stays mutated.
    "vault.rs:[0-9]+:19: replace < with <= in Vault",

    # Soroswap pair orientation `token_in < token_out`: equality means
    # token_in == token_out, which `HopContext::new` already rejects with
    # `SameToken` before any venue code runs, so `<` vs `<=` is unreachable
    # at the only diverging input.
    "soroswap.rs:[0-9]+:42: replace < with <= in swap",

    # Sushi's local `amount_out = after - before` is re-derived independently
    # by `dispatch_hop`'s balance-delta check over the same pre-call snapshot
    # (no transfers occur between the two reads). In every case where the
    # mutated `+` changes the local `<= 0` verdict, `dispatch_hop` computes
    # the true delta and raises the identical `ZeroOutput`, and the venue's
    # return value is discarded by `dispatch_hop`, so callers see no
    # difference.
    "sushi.rs:[0-9]+:43: replace - with \\+ in swap",

    # Router-side pre-authorization entries that are never consumable under
    # SEP-41 auth semantics: `authorize_token_approve` precedes a DIRECT
    # `token.approve` call (owner = router = direct invoker, so invoker auth
    # satisfies `require_auth` without the entry), and `authorize_comet_swap`
    # covers `require_auth(router)` inside a pool the router invokes DIRECTLY
    # plus a `transfer_from` sub-call whose SEP-41 auth is on the SPENDER
    # (the pool, itself a direct invoker). Verified empirically: with both
    # bodies stubbed to no-ops the full aggregator suite still passes. The
    # entries are kept as defense-in-depth for live venues with richer auth
    # trees, which native unit tests cannot model.
    "replace authorize_token_approve with \\(\\)",
    "replace authorize_comet_swap with \\(\\)",
]
