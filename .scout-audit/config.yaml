# Scout detector suppressions for this protocol. Consumed by the CI `scout-audit`
# job via .github/scripts/run_scout.sh (tarred into the scan copy; the tar excludes
# only .git and target, so this file is carried). Each exclusion is load-bearing —
# do not trim without re-checking the build profile / auth model.
exclude:
  # [profile.release] sets overflow-checks = true + panic = "abort", so every
  # arithmetic overflow traps -> reverts (non-exploitable). Scout's integer-overflow
  # detector does not model overflow-checks; its sibling `overflow-check` detector
  # already verifies the flag is set.
  - integer-overflow-or-underflow
  # supply/borrow/withdraw are intentionally permissionless with per-user-keyed
  # storage; the detector's "storage op without require_auth in this fn = DoS"
  # model does not represent per-user keys or SAC-transfer auth.
  - dos-unexpected-revert-with-storage

# Required: loading a config file makes Scout adopt the config's output_format and
# ignore the CLI `--output-format`, so without this the .md reports are silently
# dropped (only .log is written). run_scout.sh renders Markdown.
output_format:
  - Markdown
