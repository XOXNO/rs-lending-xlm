{
    "msg": "Controller heavy liquidation integrity",
    "optimistic_loop": true,
    "independent_satisfy": true,
    "precise_bitwise_ops": false,
    "loop_iter": "3",
    "rule_sanity": "none",
    "smt_timeout": "7200",
    "global_timeout": "7200",
    "rule": [
        "liquidation_strictly_decreases_debt_for_repaid_asset",
        "liquidation_strictly_decreases_collateral_for_seized_asset",
        "protocol_fee_on_bonus_only",
        "ideal_repayment_targets_102"
    ],
    "prover_args": [
        "-maxBlockCount 800000",
        "-maxCommandCount 3000000",
        "-splitParallel true",
        "-dontStopAtFirstSplitTimeout true"
    ],
    "server": "prover",
    "build_script": "../certora_build.py",
    "cargo_features": [
        "certora"
    ]
}
