{
    "msg": "Controller solvency - reserves and supply limits",
    "optimistic_loop": true,
    "precise_bitwise_ops": false,
    "loop_iter": "3",
    "rule_sanity": "basic",
    "rule": [
        "claim_revenue_bounded_by_reserves",
        "utilization_zero_when_supplied_zero",
        "supply_rejects_zero_amount",
        "supply_position_limit_enforced",
        "supply_respects_supply_cap"
    ],
    "server": "prover",
    "cargo_features": [
        "certora"
    ],
    "prover_args": [
        "-maxBlockCount 500000",
        "-maxCommandCount 2000000"
    ],
    "independent_satisfy": true,
    "smt_timeout": "1800",
    "global_timeout": "7200",
    "files": [
        "../../../../artifacts/wasm/certora/controller.wasm"
    ]
}
