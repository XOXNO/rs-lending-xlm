{
    "msg": "Controller Aave-style parity rules",
    "optimistic_loop": true,
    "precise_bitwise_ops": false,
    "loop_iter": "3",
    "rule_sanity": "basic",
    "rule": [
        "no_collateral_account_cannot_borrow",
        "supply_does_not_change_other_account_positions",
        "borrow_does_not_change_other_account_positions",
        "repay_only_changes_target_account_debt",
        "disabled_market_blocks_new_supply",
        "pending_oracle_market_blocks_new_borrow",
        "controller_supply_persists_pool_returned_position",
        "controller_borrow_persists_pool_returned_position",
        "controller_parity_reachability"
    ],
    "server": "prover",
    "build_script": "../certora_build.py",
    "cargo_features": [
        "certora"
    ],
    "prover_args": [
        "-maxBlockCount 500000",
        "-maxCommandCount 2000000"
    ],
    "independent_satisfy": true,
    "smt_timeout": "1800",
    "global_timeout": "7200"
}
