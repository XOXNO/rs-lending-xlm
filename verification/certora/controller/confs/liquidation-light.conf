{
    "msg": "Controller liquidation light checks",
    "optimistic_loop": true,
    "precise_bitwise_ops": false,
    "loop_iter": "1",
    "rule_sanity": "basic",
    "rule": [
        "liquidation_strictly_decreases_debt_for_repaid_asset",
        "liquidation_strictly_decreases_collateral_for_seized_asset",
        "bonus_bounded",
        "seizure_proportional",
        "protocol_fee_on_bonus_only",
        "liquidation_bonus_sanity",
        "estimate_liquidation_sanity"
    ],
    "server": "prover",
    "build_script": "../certora_build.py",
    "cargo_features": [
        "certora"
    ],
    "prover_args": [
        "-maxBlockCount 200000"
    ],
    "independent_satisfy": true,
    "smt_timeout": "900",
    "global_timeout": "3600"
}
