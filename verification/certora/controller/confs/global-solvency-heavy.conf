{
    "msg": "Controller heavy solvency and accounting",
    "optimistic_loop": true,
    "independent_satisfy": true,
    "precise_bitwise_ops": false,
    "loop_iter": "3",
    "rule_sanity": "none",
    "smt_timeout": "7200",
    "global_timeout": "7200",
    "rule": [
        "borrow_respects_reserves",
        "ltv_borrow_bound_enforced",
        "claim_revenue_bounded_by_reserves",
        "supply_index_grows_slower",
        "supply_withdraw_roundtrip_no_profit",
        "borrow_repay_roundtrip_no_profit",
        "mode_transition_blocked_with_positions"
    ],
    "prover_args": [
        "-maxBlockCount 800000",
        "-maxCommandCount 3000000",
        "-splitParallel true",
        "-dontStopAtFirstSplitTimeout true"
    ],
    "server": "prover",
    "build_script": "../certora_build.py",
    "cargo_features": [
        "certora"
    ]
}
