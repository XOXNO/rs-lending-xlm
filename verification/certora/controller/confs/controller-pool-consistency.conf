{
    "msg": "Controller-pool consistency",
    "optimistic_loop": true,
    "independent_satisfy": true,
    "precise_bitwise_ops": false,
    "loop_iter": "3",
    "rule_sanity": "none",
    "smt_timeout": "7200",
    "global_timeout": "7200",
    "rule": [
        "controller_supply_persists_pool_returned_position",
        "controller_borrow_persists_pool_returned_position"
    ],
    "prover_args": [
        "-maxBlockCount 800000",
        "-maxCommandCount 3000000",
        "-splitParallel true",
        "-dontStopAtFirstSplitTimeout true"
    ],
    "server": "prover",
    "build_script": "../certora_build.py",
    "cargo_features": [
        "certora"
    ]
}
