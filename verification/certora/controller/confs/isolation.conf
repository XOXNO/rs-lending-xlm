{
    "msg": "Controller isolation-mode risk gates",
    "optimistic_loop": true,
    "precise_bitwise_ops": false,
    "loop_iter": "3",
    "rule_sanity": "basic",
    "rule": [
        "ltv_less_than_liquidation_threshold",
        "liquidation_bonus_capped",
        "reserve_factor_bounded",
        "utilization_params_ordered",
        "isolated_single_collateral",
        "isolation_debt_ceiling_respected",
        "isolation_sanity",
        "emode_sanity"
    ],
    "server": "prover",
    "build_script": "../certora_build.py",
    "cargo_features": [
        "certora"
    ],
    "prover_args": [
        "-maxBlockCount 500000",
        "-maxCommandCount 2000000"
    ],
    "independent_satisfy": true,
    "smt_timeout": "1800",
    "global_timeout": "7200"
}
