{
    "msg": "Controller index integrity",
    "optimistic_loop": true,
    "precise_bitwise_ops": false,
    "loop_iter": "3",
    "rule_sanity": "basic",
    "rule": [
        "supply_index_above_floor",
        "borrow_index_gte_ray",
        "borrow_index_monotonic_after_accrual",
        "supply_index_monotonic_after_accrual",
        "indexes_unchanged_when_no_time_elapsed",
        "index_sanity"
    ],
    "server": "prover",
    "build_script": "../certora_build.py",
    "cargo_features": [
        "certora"
    ],
    "prover_args": [
        "-maxBlockCount 300000"
    ],
    "independent_satisfy": true,
    "smt_timeout": "900",
    "global_timeout": "3600"
}
