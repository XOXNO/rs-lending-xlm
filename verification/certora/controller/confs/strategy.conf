{
    "msg": "Controller strategy flows",
    "optimistic_loop": true,
    "precise_bitwise_ops": false,
    "loop_iter": "3",
    "rule_sanity": "basic",
    "rule": [
        "multiply_rejects_same_tokens",
        "multiply_requires_collateralizable",
        "swap_debt_conserves_debt_value",
        "swap_debt_rejects_same_token",
        "swap_collateral_conserves_collateral",
        "swap_collateral_rejects_same_token",
        "swap_collateral_rejects_isolated",
        "clean_bad_debt_requires_qualification",
        "clean_bad_debt_zeros_positions",
        "claim_revenue_transfers_to_accumulator",
        "multiply_sanity",
        "swap_debt_sanity",
        "swap_collateral_sanity",
        "clean_bad_debt_sanity"
    ],
    "server": "prover",
    "build_script": "../certora_build.py",
    "cargo_features": [
        "certora"
    ],
    "prover_args": [
        "-maxBlockCount 500000",
        "-maxCommandCount 2000000"
    ],
    "independent_satisfy": true,
    "smt_timeout": "1800",
    "global_timeout": "7200"
}
