{
    "msg": "Pool additivity and no-profit",
    "optimistic_loop": true,
    "precise_bitwise_ops": false,
    "loop_iter": "1",
    "rule_sanity": "basic",
    "rule": [
        "supply_split_scaled_amount_bounded_by_single",
        "borrow_split_scaled_amount_bounded_by_single",
        "supply_withdraw_roundtrip_scaled_no_profit",
        "borrow_repay_roundtrip_scaled_no_profit",
        "pool_additivity_reachability"
    ],
    "server": "prover",
    "build_script": "../certora_build.py",
    "cargo_features": [
        "certora"
    ],
    "prover_args": [
        "-maxBlockCount 300000",
        "-maxCommandCount 1000000"
    ],
    "independent_satisfy": true,
    "smt_timeout": "1800",
    "global_timeout": "7200"
}
