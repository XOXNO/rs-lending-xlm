{
    "msg": "Pool critical summary-contract proofs",
    "optimistic_loop": true,
    "independent_satisfy": true,
    "precise_bitwise_ops": false,
    "loop_iter": "3",
    "rule_sanity": "none",
    "smt_timeout": "7200",
    "global_timeout": "7200",
    "rule": [
        "supply_satisfies_controller_summary_contract",
        "borrow_satisfies_controller_summary_contract",
        "withdraw_satisfies_controller_summary_contract",
        "repay_satisfies_controller_summary_contract",
        "seize_position_satisfies_controller_summary_contract",
        "claim_revenue_satisfies_controller_summary_contract"
    ],
    "prover_args": [
        "-maxBlockCount 800000",
        "-maxCommandCount 3000000",
        "-splitParallel true",
        "-dontStopAtFirstSplitTimeout true"
    ],
    "server": "prover",
    "build_script": "../certora_build.py",
    "cargo_features": [
        "certora"
    ]
}
