{
    "msg": "Pool integrity",
    "optimistic_loop": true,
    "precise_bitwise_ops": false,
    "loop_iter": "3",
    "rule_sanity": "basic",
    "rule": [
        "constructor_initializes_valid_state",
        "pool_state_domain_invariant",
        "supply_preserves_nonnegative_state",
        "borrow_preserves_nonnegative_state",
        "withdraw_never_creates_negative_position",
        "repay_never_creates_negative_debt",
        "bad_debt_socialization_keeps_supply_index_above_floor",
        "seize_position_zeroes_scaled_amount",
        "update_params_keeps_rate_domain",
        "pool_integrity_reachability"
    ],
    "server": "prover",
    "build_script": "../certora_build.py",
    "cargo_features": [
        "certora"
    ],
    "prover_args": [
        "-maxBlockCount 300000",
        "-maxCommandCount 1000000"
    ],
    "independent_satisfy": true,
    "smt_timeout": "900",
    "global_timeout": "3600"
}
