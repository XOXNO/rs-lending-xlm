{
    "msg": "Common rate and index math",
    "optimistic_loop": true,
    "precise_bitwise_ops": false,
    "loop_iter": "3",
    "rule_sanity": "basic",
    "rule": [
        "utilization_zero_when_supplied_zero",
        "utilization_bounded_when_borrowed_lte_supplied",
        "borrow_rate_is_capped",
        "deposit_rate_zero_when_no_utilization",
        "deposit_rate_not_above_borrow_rate",
        "compound_interest_identity_at_zero_delta",
        "update_borrow_index_monotonic_when_factor_gte_one",
        "update_supply_index_monotonic_when_rewards_positive",
        "supplier_rewards_plus_fee_equals_accrued_interest",
        "simulate_indexes_no_time_noop",
        "rates_reachability"
    ],
    "server": "prover",
    "build_script": "../certora_build.py",
    "cargo_features": [
        "certora"
    ],
    "prover_args": [
        "-maxBlockCount 300000",
        "-maxCommandCount 1000000"
    ],
    "independent_satisfy": true,
    "smt_timeout": "900",
    "global_timeout": "3600"
}
