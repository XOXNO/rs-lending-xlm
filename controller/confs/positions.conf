{
    "optimistic_loop": true,
    "precise_bitwise_ops": false,
    "loop_iter": "12",
    "rule_sanity": "basic",
    "rule": [
        "supply_increases_position",
        "borrow_increases_debt",
        "full_repay_clears_debt",
        "withdraw_decreases_position",
        "repay_decreases_debt",
        "supply_sanity"
    ],
    "server": "prover",
    "build_script": "../certora_build.py",
    "cargo_features": [
        "certora"
    ],
    "prover_args": [
        "-maxBlockCount 300000"
    ]
}
