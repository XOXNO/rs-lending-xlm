{
    "optimistic_loop": true,
    "precise_bitwise_ops": true,
    "loop_iter": "1",
    "rule_sanity": "none",
    "rule": [
        "mul_half_up_commutative",
        "mul_half_up_zero",
        "mul_half_up_identity",
        "div_half_up_inverse",
        "div_half_up_zero_numerator",
        "mul_half_up_rounding_direction",
        "div_half_up_rounding_direction",
        "rescale_upscale_lossless",
        "rescale_roundtrip",
        "signed_mul_away_from_zero",
        "i256_no_overflow",
        "div_by_zero_sanity"
    ],
    "server": "prover",
    "build_script": "../certora_build.py",
    "cargo_features": [
        "certora"
    ],
    "prover_args": [
        "-maxBlockCount 100000",
        "-maxCommandCount 500000"
    ]
}
