{
    "optimistic_loop": true,
    "precise_bitwise_ops": false,
    "loop_iter": "12",
    "rule_sanity": "none",
    "rule": [
        "pool_reserves_cover_net_supply",
        "revenue_subset_of_supplied",
        "borrowed_lte_supplied",
        "claim_revenue_bounded_by_reserves",
        "utilization_zero_when_supplied_zero",
        "isolation_debt_never_negative_after_repay",
        "borrow_respects_reserves",
        "ltv_borrow_bound_enforced",
        "supply_index_above_floor_after_supply",
        "supply_index_monotonic_across_borrow",
        "supply_rejects_zero_amount",
        "borrow_rejects_zero_amount",
        "withdraw_rejects_zero_amount",
        "repay_rejects_zero_amount",
        "supply_position_limit_enforced",
        "borrow_position_limit_enforced",
        "supply_scaled_conservation",
        "borrow_scaled_conservation",
        "repay_scaled_conservation",
        "borrow_index_gte_supply_index",
        "supply_index_grows_slower",
        "index_cache_single_snapshot",
        "supply_withdraw_roundtrip_no_profit",
        "borrow_repay_roundtrip_no_profit",
        "price_cache_invalidation_after_swap",
        "mode_transition_blocked_with_positions",
        "compound_interest_bounded_output",
        "compound_interest_no_wrap",
        "solvency_sanity_supply",
        "solvency_sanity_borrow",
        "solvency_sanity_repay",
        "compound_no_wrap_sanity",
        "index_cache_snapshot_sanity",
        "roundtrip_supply_sanity"
    ],
    "server": "prover",
    "build_script": "../certora_build.py",
    "cargo_features": [
        "certora"
    ],
    "prover_args": [
        "-maxBlockCount 500000",
        "-maxCommandCount 2000000"
    ]
}
