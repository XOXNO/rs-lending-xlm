{
    "optimistic_loop": true,
    "precise_bitwise_ops": false,
    "loop_iter": "12",
    "rule_sanity": "none",
    "rule": [
        "price_staleness_enforced",
        "first_tolerance_uses_safe_price",
        "second_tolerance_uses_average",
        "price_cache_consistency",
        "oracle_tolerance_sanity",
        "price_cache_sanity"
    ],
    "server": "prover",
    "build_script": "../certora_build.py",
    "cargo_features": [
        "certora"
    ],
    "prover_args": [
        "-maxBlockCount 300000"
    ]
}
