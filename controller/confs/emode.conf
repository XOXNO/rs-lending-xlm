{
    "optimistic_loop": true,
    "precise_bitwise_ops": false,
    "loop_iter": "12",
    "rule_sanity": "none",
    "rule": [
        "emode_only_registered_assets",
        "emode_borrow_only_registered_assets",
        "emode_only_borrowable_assets",
        "emode_only_collateralizable_assets",
        "deprecated_emode_blocks_new_supply",
        "deprecated_emode_blocks_new_borrow",
        "deprecated_emode_allows_withdraw",
        "emode_overrides_asset_params",
        "emode_category_has_valid_params",
        "emode_remove_category",
        "emode_add_asset_to_deprecated_category",
        "emode_account_cannot_enter_isolation",
        "emode_supply_sanity",
        "emode_borrow_sanity"
    ],
    "server": "prover",
    "build_script": "../certora_build.py",
    "cargo_features": [
        "certora"
    ],
    "prover_args": [
        "-maxBlockCount 300000"
    ]
}
