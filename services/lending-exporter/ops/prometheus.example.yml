# Scrape jobs to add to /data/coolify/prometheus/prometheus.yml.
#
# Each exporter instance serves exactly one network and already stamps a
# `network` label on every series, but we also set a static `network` label per
# job so `up`/scrape-meta series carry it too. The metrics_path is /metrics.
#
# The mainnet job is commented out until mainnet contracts are deployed and a
# lending-exporter-mainnet instance is running.

scrape_configs:
  - job_name: stellar-lending-exporter-testnet
    metrics_path: /metrics
    static_configs:
      - targets: ['lending-exporter-testnet:9110']
        labels:
          network: testnet

