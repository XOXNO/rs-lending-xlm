services:
  keeper-testnet:
    image: keeper-bot:latest
    restart: unless-stopped
    environment:
      KEEPER_CONFIG: /etc/keeper/testnet.yaml
      RUST_LOG: info
      # Azure SP credentials — required because mx-keyvault has no real
      # Managed Identity path. Inject from your secret store.
      AZURE_TENANT_ID: ${AZURE_TENANT_ID}
      AZURE_CLIENT_ID: ${AZURE_CLIENT_ID}
      AZURE_CLIENT_SECRET: ${AZURE_CLIENT_SECRET}
    ports:
      - "9091:9090"
    healthcheck:
      test: ["CMD", "/usr/local/bin/keeper-bot", "--help"]
      interval: 60s
      timeout: 5s
      retries: 3

  keeper-mainnet:
    image: keeper-bot:latest
    restart: unless-stopped
    environment:
      KEEPER_CONFIG: /etc/keeper/mainnet.yaml
      RUST_LOG: info
      AZURE_TENANT_ID: ${AZURE_TENANT_ID}
      AZURE_CLIENT_ID: ${AZURE_CLIENT_ID}
      AZURE_CLIENT_SECRET: ${AZURE_CLIENT_SECRET}
    ports:
      - "9090:9090"
    depends_on:
      - keeper-testnet
