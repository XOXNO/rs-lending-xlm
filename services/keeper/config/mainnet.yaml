network: mainnet

rpc:
  url: https://soroban-rpc.mainnet.stellar.gateway.fm
  passphrase: "Public Global Stellar Network ; September 2015"
  timeout_seconds: 30

contracts:
  # NOTE: mainnet contract IDs are unset in configs/networks.json today.
  # Populate before deploying to mainnet.
  controller: ""
  pool_wasm_hash: ""
  market_assets: []
  flash_loan_receiver: ""
  # Optional: governance contract that owns the controller. When set, its
  # instance + MinDelay (instance-tier) + role keys are bumped too. Populate
  # alongside the other mainnet ids.
  governance: ""

keyvault:
  url: https://my-vault.vault.azure.net
  secret_name: keeper-mnemonic-mainnet

signer:
  derivation_path: "m/44'/148'/0'"

fees:
  base_fee_stroops: 100
  resource_fee_multiplier: 1.30

schedule:
  ttl_tick_seconds: 21600
  index_tick_seconds: 3600
  ttl_safety_margin_days: 21
  asset_chunk: 20
  max_txs_per_tick: 80
  enable_index_refresh: false

metrics:
  bind: 0.0.0.0:9090

log:
  level: info
  format: json
